server {
    listen 80;
    server_name tumpline.ca www.tumpline.ca;

    # Redirect www → apex (Cloudflare handles this in prod, but good for local)
    if ($host = "www.tumpline.ca") {
        return 301 $scheme://tumpline.ca$request_uri;
    }

    root /usr/share/nginx/html;
    index index.html;

    # Gzip
    gzip on;
    gzip_types text/html text/css application/javascript image/svg+xml;
    gzip_min_length 1024;

    # Cache static assets
    location ~* \.(jpg|jpeg|png|gif|ico|svg|woff2|woff|ttf)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # HTML — no cache (Cloudflare handles revalidation in prod)
    location ~* \.html$ {
        add_header Cache-Control "public, max-age=0, must-revalidate";
    }

    # Security headers
    add_header X-Frame-Options "DENY";
    add_header X-Content-Type-Options "nosniff";
    add_header Referrer-Policy "strict-origin-when-cross-origin";

    location / {
        try_files $uri $uri/ /index.html;
    }
}
