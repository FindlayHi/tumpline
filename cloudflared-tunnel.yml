# Cloudflare Tunnel config — run on the node hosting the tumpline container
# Usage:
#   1. cloudflared tunnel login
#   2. cloudflared tunnel create tumpline
#   3. Copy tunnel UUID into `tunnel:` below
#   4. cloudflared tunnel route dns tumpline tumpline.ca
#   5. cloudflared tunnel route dns tumpline www.tumpline.ca
#   6. cloudflared tunnel run --config cloudflared-tunnel.yml

tunnel: <YOUR-TUNNEL-UUID>
credentials-file: /etc/cloudflared/<YOUR-TUNNEL-UUID>.json

ingress:
  - hostname: tumpline.ca
    service: http://localhost:8080
  - hostname: www.tumpline.ca
    service: http://localhost:8080
  # Catch-all (required)
  - service: http_status:404
